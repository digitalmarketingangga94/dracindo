[build]
  command = "pnpm install --no-frozen-lockfile && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/sitemap-keyword.xml"
  to = "/.netlify/functions/sitemap-keyword"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200