[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  PNPM_FLAGS = "--no-frozen-lockfile"

[[redirects]]
  from = "/sitemap-keyword.xml"
  to = "/.netlify/functions/sitemap-keyword"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200